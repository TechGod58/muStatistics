name: Perf Regression Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  perf-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MU_PORTABLE: "1"
      MU_STORAGE_ROOT: ".tmp/perf-storage"
      APP_ORIGIN: "http://localhost:3000"
      SESSION_SECRET: "ci-session-secret-please-replace-for-production-only"
      MU_API_BASE: "http://localhost:4000"
      NODE_ENV: "test"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @mu/api build

      - name: Start API
        run: |
          mkdir -p .logs
          pnpm --filter @mu/api start > .logs/api-perf-gate.log 2>&1 &
          echo $! > .logs/api-perf-gate.pid

      - name: Run perf regression gate
        run: pnpm test:perf:gate

